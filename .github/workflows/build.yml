name: Build Dragon Tiger APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ZIP extract karo
      - name: Extract project zip
        id: extract
        run: |
          unzip -o games-hack.zip
          echo "proj_dir=games-hack" >> $GITHUB_OUTPUT

      # Node.js setup
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Java setup (Android build ke liye)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Dependencies install karo
      - name: Install dependencies
        working-directory: ${{ steps.extract.outputs.proj_dir }}
        run: npm install

      # Android project generate karo (bina Expo account ke)
      - name: Generate Android project
        working-directory: ${{ steps.extract.outputs.proj_dir }}
        run: npx expo prebuild --platform android --clean --no-install

      # APK build karo Gradle se
      - name: Build APK with Gradle
        working-directory: ${{ steps.extract.outputs.proj_dir }}/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      # APK as artifact save karo
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: dragon-tiger-apk
          path: |
            ${{ steps.extract.outputs.proj_dir }}/android/app/build/outputs/apk/release/*.apk
          retention-days: 30
