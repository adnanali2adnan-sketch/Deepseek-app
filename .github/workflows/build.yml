name: Unzip and Compile RangoHUD APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Extract Project ZIP File & Clean Conflict Workflows
        run: |
          echo "Extracting RangoHUD_CloudEngine.zip..."
          unzip -q RangoHUD_CloudEngine.zip -d extracted_project
          
          # Conflict cleaning: extraction ke andar agar koi purani .github/workflows file hai to use delete karo
          if [ -d "extracted_project/RangoHUD/.github" ]; then
            echo "Removing old internal workflow tracking folder to avoid conflicts..."
            rm -rf extracted_project/RangoHUD/.github
          elif [ -d "extracted_project/.github" ]; then
            rm -rf extracted_project/.github
          fi

          # Files shifting to root directory
          if [ -d "extracted_project/RangoHUD" ]; then
            echo "Moving clean source files from subfolder..."
            mv extracted_project/RangoHUD/* .
            mv extracted_project/RangoHUD/.* . 2>/dev/null || true
          else
            echo "Moving clean source files from root of extraction..."
            mv extracted_project/* .
            mv extracted_project/.* . 2>/dev/null || true
          fi
          
          echo "Listing structure to verify clean setup:"
          ls -la

      - name: Setup Java Development Kit Core 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant Execute Permission for Gradle
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          else
            echo "Local gradlew not found, setting up fallback framework..."
          fi

      - name: Setup Gradle Runner Pack
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.5

      - name: Compile and Build Debug Application Binary
        run: gradle assembleDebug --no-daemon

      - name: Upload Finished Production APK Target
        uses: actions/upload-artifact@v4
        with:
          name: RangoHUD-Automation-Build
          path: app/build/outputs/apk/debug/*.apk

